name: Deploy environment-web-app to GitHub Pages

on:
  push:
    branches: [main, deployment]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; annule les runs en attente si un nouveau push arrive
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── 1. Lint & Build ──────────────────────────────────────────────────────────
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Extrait le nom du dépôt depuis "owner/repo" → "/repo/"
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_API_URL: ./data.json

      - name: Upload artifact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── 2. Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: lint-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
