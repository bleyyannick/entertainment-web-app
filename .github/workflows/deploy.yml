name: Workflow for continuous deployment to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

  test-frontend:
    name: Test — Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run unit tests
        working-directory: ./frontend
        run: npm run test:unit:ci
        env:
          CI: true

      - name: Run integration tests
        working-directory: ./frontend
        run: npm run test:integration:ci
        env:
          CI: true

      - name: Publish frontend coverage summary
        if: always()
        run: node scripts/ci/publish-frontend-coverage-summary.cjs

      - name: Publish unit test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: "Vitest — frontend (unit)"
          path: frontend/junit-unit.xml
          reporter: jest-junit

      - name: Publish integration test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: "Vitest — frontend (integration)"
          path: frontend/junit-integration.xml
          reporter: jest-junit

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-coverage
          path: frontend/coverage

  test-backend:
    name: Test — Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Run unit tests
        working-directory: ./backend
        run: npm run test:unit:ci
        env:
          CI: true

      - name: Run integration tests
        working-directory: ./backend
        run: npm run test:integration:ci
        env:
          CI: true

      - name: Publish backend coverage summary
        if: always()
        run: node scripts/ci/publish-backend-coverage-summary.cjs

      - name: Publish unit test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: "Vitest — backend (unit)"
          path: backend/junit-unit.xml
          reporter: jest-junit

      - name: Publish integration test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: "Vitest — backend (integration)"
          path: backend/junit-integration.xml
          reporter: jest-junit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-frontend, test-backend]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Download coverage artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Copy coverage report into dist
        run: cp -r frontend/coverage frontend/dist/coverage

      - name: Upload artifact Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
