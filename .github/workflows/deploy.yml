name: Deploy environment-web-app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend && npm ci --prefix backend

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Test frontend
        if: always()
        working-directory: ./frontend
        run: npm test -- --reporter=junit --outputFile=junit-results.xml --coverage --coverage.reporter=lcov --coverage.reporter=html
        env:
          CI: true

      - name: Test backend
        if: always()
        working-directory: ./backend
        run: npm test -- --reporter=junit --outputFile=junit-results.xml
        env:
          CI: true

      - name: Publish frontend test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Vitest — frontend"
          path: frontend/junit-results.xml
          reporter: jest-junit

      - name: Publish backend test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Vitest — backend"
          path: backend/junit-results.xml
          reporter: jest-junit

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Copy coverage report into dist
        run: cp -r frontend/coverage frontend/dist/coverage

      - name: Upload artifact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
