name: Deploy environment-web-app to GitHub Pages

on:
  push:
    branches: [main, deployment]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── 1. CI (test + lint + build) ───────────────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend && npm ci --prefix backend

      - name: Test frontend
        working-directory: ./frontend
        run: npm test

      - name: Test backend
        working-directory: ./backend
        run: npm test

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_API_URL: ./data.json

      - name: Upload artifact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  # ── 2. Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
